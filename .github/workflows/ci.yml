name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend app
        working-directory: backend
        run: python -m compileall app

      - name: Run backend unit tests if present
        working-directory: backend
        run: |
          if [ -d tests ]; then
            python -m unittest discover -s tests
          else
            echo "No backend/tests directory found; skipping unit tests."
          fi

      - name: Run backend orchestrator smoke test
        working-directory: backend
        run: |
          python - <<'PY'
          from app.orchestrator import run_research_pipeline
          from app.schemas import ResearchRunRequest

          questions = [
              "How would rate cuts affect Canadian banks?",
              "What happens to airlines if oil prices rise while consumer demand weakens?",
              "Is AI capex becoming a risk for semiconductors and hyperscalers?",
              "Unknown custom question",
          ]

          allowed_evidence_labels = {
              "Data",
              "Source claim",
              "Framework inference",
              "Narrative signal",
              "Open question",
          }

          for question in questions:
              run = run_research_pipeline(ResearchRunRequest(question=question))
              assert run.question == question
              assert run.transmissionNodes
              assert run.charts
              assert run.evidence

              for item in run.evidence:
                  assert item.type in allowed_evidence_labels, item.type

          print("backend orchestrator smoke test passed")
          PY

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build
